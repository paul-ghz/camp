<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

    <style>

        body{

            background-image: url("fundal_camp.png");

            object-fit: cover;

            background-repeat: no-repeat;

            background-size: cover;

        }

        .textbox{

            width:   10dvw;

            height: 5dvh;

            border-radius: 5px;

            border: none;

            text-align: center;

            margin-left: 40dvw;

        }

        .buton{

            width: 10dvw;

            height: 5dvh;

            border-radius: 5px;

            border: none;

            background-color: #4CAF50;

            color: white;

            cursor: pointer;

            margin-top: 5dvh;

        }

.main{
    display: grid;
    grid-template-rows: 50%;
    margin-top: 37.5dvh; /* Change from 15dvh to a larger value */
}
.flori{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 25dvh;
    gap: 5px; /* Adjust this value: 0px for no space, 2px for tiny space, etc. */
}

.flori img {
    margin: 0 -50px; /* Optional: use negative margin to make them overlap */
}
    </style>

</head>

<body>

    <div class="main" id="main">

        <div class="flori" id="flori">

        </div>

    </div>

    <input type="text" class="textbox" placeholder="Nume" id="textbox">

    <button class="buton" onclick="fct()">Afiseaza</button>

    <script>

       function fct(){
    var nume = document.querySelector(".textbox").value;
    let caractere=[...nume];
    document.getElementById("flori").innerHTML="";
    
    for(let i=0;i<caractere.length;i++){
        if(caractere[i]=='a'){document.getElementById("flori").innerHTML+=`<img src="A lalele.png" style="height: 30dvh;">`}

    }
}

    </script>

</body>

</html>
